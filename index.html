    function Auth({ mode, go, login }) {
      const [isL, setIsL] = useState(mode==="login");
      const [f, setF] = useState({name:"",email:"",mobile:"",uid:"",pass:""});
      const [ld, setLd] = useState(false);
      const [err, setErr] = useState("");
      const submit = async () => {
        setErr(""); setLd(true);
        try {
          if (isL) {
            if (!f.email||!f.pass) { setErr("Email aur password zaroori hai"); setLd(false); return; }
            const cred = await signInWithEmailAndPassword(fbAuth, f.email, f.pass);
            const snap = await getDoc(doc(fbDB, "users", cred.user.uid));
            login(snap.exists() ? {...snap.data(),firebaseUid:cred.user.uid} : {name:f.email.split("@")[0],email:f.email,wallet:0,firebaseUid:cred.user.uid});
            go("profile");
          } else {
            if (!f.name||!f.email||!f.mobile||!f.uid||!f.pass) { setErr("Sab fields fill karo"); setLd(false); return; }
            if (f.pass.length < 6) { setErr("Password min 6 characters ka ho"); setLd(false); return; }
            const cred = await createUserWithEmailAndPassword(fbAuth, f.email, f.pass);
            const userData = {name:f.name,email:f.email,mobile:f.mobile,uid:f.uid,wallet:0,txns:[],createdAt:new Date().toISOString()};
            await setDoc(doc(fbDB,"users",cred.user.uid), userData);
            login({...userData,firebaseUid:cred.user.uid});
            go("profile");

    function App() {
      const [page, setPage] = useState("home");
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      useEffect(()=>{
        const s=document.createElement("style");

        if(!document.getElementById("fz"))document.head.appendChild(s);
        return()=>{const el=document.getElementById("fz");if(el)el.remove();};
      },[]);

      useEffect(()=>{
        if(!fbAuth){setAuthLoading(false);return;}
        const unsub = onAuthStateChanged(fbAuth, async (firebaseUser) => {
          if (firebaseUser) {
            try {
              const snap = await getDoc(doc(fbDB,"users",firebaseUser.uid));
              setUser(snap.exists()?{...snap.data(),firebaseUid:firebaseUser.uid}:{name:firebaseUser.email?.split("@")[0]||"Player",email:firebaseUser.email,wallet:0,firebaseUid:firebaseUser.uid});
            } catch(e) {
              setUser({name:firebaseUser.email?.split("@")[0]||"Player",email:firebaseUser.email,wallet:0,firebaseUid:firebaseUser.uid});
            }
          } else { setUser(null); }
          setAuthLoading(false);
        });
        return()=>unsub();
      },[]);

      const go     = useCallback((p)=>{setPage(p);window.scrollTo(0,0);},[]);
      const login  = useCallback((u)=>setUser(u),[]);
      const logout = useCallback(async()=>{await signOut(fbAuth);setUser(null);},[]);
      const upd    = useCallback(async(u)=>{
        setUser(u);
        if(u.firebaseUid){try{const{firebaseUid,...d}=u;await updateDoc(doc(fbDB,"users",firebaseUid),d);}catch(e){}}
      },[]);

      if(authLoading)return(
        <div style={{minHeight:"100vh",background:"#0a0b0f",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
          <div style={{width:40,height:40,border:"3px solid #ff4d00",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
          <div style={{color:"#ff4d00",fontFamily:"'Courier New',monospace",fontSize:12,letterSpacing:3}}>LOADING...</div>
        </div>
      );

      const render=()=>{
        if(page.startsWith("pay_"))return <PayPage tid={page.split("_")[1]} go={go} user={user}/>;
        switch(page){
          case "home":        return <Home go={go}/>;
          case "tournaments": return <div style={{padding:"80px 24px 52px",maxWidth:1200,margin:"0 auto"}}><div className="st" style={{marginBottom:26}}>ALL <span>TOURNAMENTS</span></div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:15}}>{TOURS.map(t=><TC key={t.id} t={t} go={go}/>)}</div></div>;
          case "leaderboard": return <Leaderboard/>;
          case "live":        return <Live/>;
          case "wallet":      return <Wallet user={user} go={go}/>;
          case "profile":     return <Profile user={user} go={go} updateUser={upd} logout={logout}/>;
          case "login":       return <Auth mode="login"  go={go} login={login}/>;
          case "signup":      return <Auth mode="signup" go={go} login={login}/>;
          case "admin":       return <Admin go={go}/>;
          default:            return <Home go={go}/>;
        }
      };

      return(
        <div style={{minHeight:"100vh",background:"#0a0b0f"}}>
          {page!=="admin"&&<Nav pg={page} go={go} user={user}/>}
          <main>{render()}</main>
          {!["admin","login","signup"].includes(page)&&<Footer go={go}/>}
